<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Footy Legends Pub</title>
<style>
  :root { --bg:#0a0f0a; --gold:#e9c46a; --text:#d8d8d8; --dim:#8a8576; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text);
         font-family:"Courier New",monospace; display:flex; flex-direction:column;
         align-items:center; justify-content:center; padding:24px; text-align:center; }
  h1 { color:var(--gold); letter-spacing:4px; font-size:28px; margin:0 0 8px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:32px; }
  a.btn { display:inline-block; background:var(--gold); color:#111; text-decoration:none;
          padding:16px 28px; font-size:16px; letter-spacing:2px; border-radius:8px; }
  .note { color:var(--dim); font-size:12px; margin-top:24px; line-height:1.7; max-width:420px; }
</style>
</head>
<body>
  <h1>FOOTY LEGENDS</h1>
  <div class="sub">PUB MODE</div>
  <a class="btn" href="host.html">HOST A GAME &#9654;</a>
  <div class="note">Players don't start here — they join by scanning the QR code<br>shown on the host screen.</div>
</body>
</html>
